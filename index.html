        const doc = new DOMParser().parseFromString(html, "text/html");
        const BLOCK_TAGS = new Set([
          "P","DIV","H1","H2","H3","H4","H5","H6",
          "LI","BLOCKQUOTE","TR","SECTION","ARTICLE",
        ]);
        function convert(node) {
          if (node.nodeType === Node.TEXT_NODE) {
            return document.createTextNode(node.textContent);
          }
          const tag = node.nodeName;
          if (tag === "EM" || tag === "I") {
            const em = document.createElement("em");
            Array.from(node.childNodes).forEach((c) => em.appendChild(convert(c)));
            return em;
          }
          if (tag === "BR") return document.createElement("br");
          const frag = document.createDocumentFragment();
          Array.from(node.childNodes).forEach((c) => frag.appendChild(convert(c)));
          if (BLOCK_TAGS.has(tag)) frag.appendChild(document.createElement("br"));
          return frag;
        }
        const frag = document.createDocumentFragment();
        Array.from(doc.body.childNodes).forEach((c) => frag.appendChild(convert(c)));
        const wrapper = document.createElement("div");
        wrapper.appendChild(frag);
        // Trim trailing <br> elements added for the last block
        while (wrapper.lastChild?.nodeName === "BR") wrapper.lastChild.remove();
        return wrapper.innerHTML;
      }

      // ---------------------------------------------------------------------------
      // UI
      // ---------------------------------------------------------------------------

      let replacements = null;
      let knownTerms = null;
      let beAeRulesCount = 0;

      const statusBar = document.getElementById("status-bar");
      const statusText = document.getElementById("status-text");
      const convertBtn = document.getElementById("convert-btn");
      const copyBtn = document.getElementById("copy-btn");
      const inputEl = document.getElementById("input-text");
      const outputEl = document.getElementById("output-highlight");
      const outputMeta = document.getElementById("output-meta");
      const changedTermsEl = document.getElementById("changed-terms");

      function setStatus(cls, msg, showSpinner) {
        statusBar.className = cls;
        statusText.textContent = msg;
        const existing = statusBar.querySelector(".spinner");
        if (showSpinner && !existing) {
          const sp = document.createElement("span");
          sp.className = "spinner";
          statusBar.insertBefore(sp, statusText);
        } else if (!showSpinner && existing) {
          existing.remove();
        }
      }

      async function loadGuide() {
        try {
          const rows = await loadXLSX("IAST.xlsx");
          const result = buildReplacements(rows);
          knownTerms = result.knownTerms;

          // Load BE→AE data (optional — app still works without it)
          let beAeRules = [];
          try {
            const beAeRows = await loadBEAEXLSX("BE_AE.xlsx");
            beAeRules = buildBEAERules(beAeRows);
            beAeRulesCount = beAeRules.length;
          } catch {
            // BE_AE.xlsx not found or failed to parse — disable the toggle
            beAeToggle.disabled = true;
            beAeToggleLabel.style.opacity = "0.4";
            beAeToggleLabel.title = "BE_AE.xlsx not found";
          }

          // Merge IAST + BE→AE rules into one sorted array (longer matches first)
          replacements = [...result.replacements, ...beAeRules].sort(
            (a, b) =>
              b.wrong.length - a.wrong.length || a.wrong.localeCompare(b.wrong),
          );

          const aeNote = beAeRulesCount
            ? `  ·  ${beAeRulesCount} AE spelling rules`
            : "";
          setStatus(
            "ready",
            `Ready — ${result.replacements.length} IAST rules${aeNote}`,
            false,
          );
          convertBtn.disabled = false;
        } catch (err) {
          setStatus("error", `Failed to load IAST.xlsx: ${err.message}`, false);
        }
      }

      const latexToggle = document.getElementById("latex-toggle");
      const romanizedToggle = document.getElementById("romanized-toggle");
      const beAeToggle = document.getElementById("beae-toggle");
      const beAeToggleLabel = document.getElementById("beae-toggle-label");

      // Toggles are mutually exclusive: turning one on turns the other off.
      latexToggle.addEventListener("change", () => {
        if (latexToggle.checked) romanizedToggle.checked = false;
      });
      romanizedToggle.addEventListener("change", () => {
        if (romanizedToggle.checked) latexToggle.checked = false;
      });

      const unknownTermsEl = document.getElementById("unknown-terms");
      const unknownChipsEl = document.getElementById("unknown-chips");

      convertBtn.addEventListener("click", () => {
        if (!replacements) return;
        const { text: input, italicRanges } = getInputContent(inputEl);
        if (!input.trim()) {
          outputEl.textContent = "";
          outputMeta.innerHTML = "";
          changedTermsEl.style.display = "none";
          changedTermsEl.innerHTML = "";
          unknownTermsEl.style.display = "none";
          copyBtn.disabled = true;
          return;
        }

        const latexMode = latexToggle.checked;
        const romanizedMode = romanizedToggle.checked;
        const beAeMode = beAeToggle.checked;
        const {
          plain,
          html,
          totalChanges,
          totalFound,
          totalBEAE,
          unknowns,
          changedWords,
        } = processText(
          input,
          replacements,
          latexMode,
          knownTerms,
          romanizedMode,
          beAeMode,
          italicRanges,
        );

        outputEl.innerHTML = html;
        outputEl._plain = plain;
        outputEl.classList.toggle("latex-output", latexMode);
        outputEl.classList.toggle("romanized-output", romanizedMode);

        if (totalChanges === 0 && totalFound === 0) {
          outputMeta.innerHTML = "No changes made.";
          changedTermsEl.style.display = "none";
          changedTermsEl.innerHTML = "";
        } else {
          const modeParts = [];
          if (latexMode) modeParts.push("LaTeX");
          if (romanizedMode) modeParts.push("Romanized");
          if (beAeMode) modeParts.push("AE");
          const modeNote = modeParts.length
            ? ` <span class="mode-note">(${modeParts.join(" · ")})</span>`
            : "";

          // Main replacement count — split IAST vs AE when both are active
          const iastChanges = totalChanges - totalBEAE;
          let metaHtml;
          if (beAeMode && totalBEAE > 0 && iastChanges > 0) {
            metaHtml = `<span>${iastChanges}</span> IAST · <span style="color:var(--c-chip-beae-fg)">${totalBEAE}</span> AE spelling`;
          } else {
            metaHtml = `<span>${totalChanges}</span> replacement${totalChanges === 1 ? "" : "s"} made`;
          }
          if (romanizedMode && totalFound > 0) {
            metaHtml += `, <span style="color:var(--c-mark-found-fg)">${totalFound}</span> already correct`;
          }
          metaHtml += modeNote;
          outputMeta.innerHTML = metaHtml;

          changedTermsEl.innerHTML = changedWords
            .map(({ from, to, italic, origin }) => {
              // Italicised output is rendered in <em> so the chip mirrors the effect.
              const toHtml = italic
                ? `<em>${escapeHtml(to)}</em>`
                : escapeHtml(to);
              // Show an arrow whenever the visible text changed (including case).
              // Italic-only chips (from === to) just show the styled output word.
              const inner =
                from !== to
                  ? `${escapeHtml(from)}<span class="ch-arrow">→</span>${toHtml}`
                  : toHtml;
              const cls = origin === "be-ae" ? " be-ae" : "";
              return `<span class="changed-chip${cls}">${inner}</span>`;
            })
            .join("");
          changedTermsEl.style.display = changedWords.length ? "flex" : "none";
        }
        copyBtn.disabled = false;

        // Render unknown Sanskrit terms
        if (unknowns.length > 0) {
          unknownChipsEl.innerHTML = unknowns
            .map((u) => `<span class="chip">${escapeHtml(u)}</span>`)
            .join("");
          unknownTermsEl.style.display = "block";
        } else {
          unknownTermsEl.style.display = "none";
        }
      });

      copyBtn.addEventListener("click", async () => {
        const plain = (outputEl._plain || "").trim();
        if (!plain) return;

        function buildCopyHtml() {
          const clone = outputEl.cloneNode(true);

          // Remove highlight <mark> wrappers, but preserve their contents.
          for (const mark of [...clone.querySelectorAll("mark")]) {
            mark.replaceWith(...mark.childNodes);
          }

          // Preserve line breaks from the preview, but remove outer whitespace.
          const html = clone.innerHTML.trim().replace(/\n/g, "<br>");

          return `<div style="font-family: Georgia, 'Times New Roman', serif; line-height: 1.7;">${html}</div>`;
        }

        function flashCopied() {
          const prev = copyBtn.textContent;
          copyBtn.textContent = "Copied!";
          setTimeout(() => {
            copyBtn.textContent = prev;
          }, 1500);
        }

        try {
          const html = buildCopyHtml();

          // Rich clipboard copy: keeps <em> italics in Word, Google Docs, email, etc.
          if (window.ClipboardItem) {
            await navigator.clipboard.write([
              new ClipboardItem({
                "text/html": new Blob([html], { type: "text/html" }),
                "text/plain": new Blob([plain], { type: "text/plain" }),
              }),
            ]);
          } else {
            await navigator.clipboard.writeText(plain);
          }

          flashCopied();
        } catch {
          // Fallback: plain-text copy only.
          const ta = document.createElement("textarea");
          ta.value = plain;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
          flashCopied();
        }
      });

      // Also allow Ctrl/Cmd+Enter to convert
      inputEl.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") convertBtn.click();
      });

      // On paste: strip all HTML formatting except italic (<em>/<i>).
      // This lets the input box show italic text visually when the user
      // copies rich text (e.g. from Word or a web page).
      inputEl.addEventListener("paste", (e) => {
        e.preventDefault();
        const html = e.clipboardData.getData("text/html");
        const text = e.clipboardData.getData("text/plain");
        if (html) {
          document.execCommand("insertHTML", false, cleanPastedHtml(html));
        } else {
          document.execCommand("insertText", false, text);
        }
      });

      // ── Dark mode toggle ─────────────────────────────────────────────────────
      const themeToggle = document.getElementById("theme-toggle");

      function applyTheme(dark) {
        document.body.classList.toggle("dark", dark);
        localStorage.setItem("iast-theme", dark ? "dark" : "light");
        themeToggle.setAttribute(
          "aria-label",
          dark ? "Switch to light mode" : "Switch to dark mode",
        );
      }

      // Initialise: respect saved preference, then system preference
      const savedTheme = localStorage.getItem("iast-theme");
      if (savedTheme) {
        applyTheme(savedTheme === "dark");
      } else {
        applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
      }

      themeToggle.addEventListener("click", () => {
        applyTheme(!document.body.classList.contains("dark"));
      });

      loadGuide();
    </script>
  </body>
</html>
