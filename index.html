<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAST Replacer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f3ee;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 18px 32px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.875rem;
      color: #666;
    }

    #status-bar {
      background: #fafaf8;
      border-bottom: 1px solid #e8e4dc;
      padding: 8px 32px;
      font-size: 0.8125rem;
      color: #666;
      min-height: 33px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-bar.loading { color: #888; }
    #status-bar.ready { color: #4a7c59; }
    #status-bar.error { color: #b94a4a; }
    #status-bar.changed { color: #2c5282; }

    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid #ccc;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      padding: 28px 32px;
      align-items: start;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
    }

    textarea {
      width: 100%;
      height: 480px;
      padding: 14px 16px;
      border: 1px solid #d0ccc4;
      border-radius: 6px;
      background: #fff;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 0.9375rem;
      line-height: 1.7;
      color: #1a1a1a;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #8b7355; }
    textarea[readonly] { background: #fafaf8; color: #333; cursor: default; }
    textarea::placeholder { color: #bbb; }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      padding-top: 24px; /* offset for label height */
    }

    button#convert-btn {
      background: #5a7a52;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    button#convert-btn:hover { background: #4a6944; }
    button#convert-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    button#copy-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.8125rem;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 10px;
    }

    button#copy-btn:hover { border-color: #8b7355; color: #333; }
    button#copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .arrow {
      font-size: 1.1rem;
      color: #aaa;
      margin-top: 14px;
    }

    .output-meta {
      font-size: 0.8rem;
      color: #888;
      min-height: 1.2em;
    }

    .output-meta span { color: #2c5282; font-weight: 500; }

    #output-highlight {
      width: 100%;
      min-height: 480px;
      max-height: 480px;
      padding: 14px 16px;
      border: 1px solid #d0ccc4;
      border-radius: 6px;
      background: #fafaf8;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 0.9375rem;
      line-height: 1.7;
      color: #1a1a1a;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #output-highlight mark {
      background: #d4edda;
      color: #1a4731;
      border-radius: 2px;
      padding: 0 1px;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      color: #aaa;
      border-top: 1px solid #e8e4dc;
    }

    @media (max-width: 800px) {
      main {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      .controls {
        flex-direction: row;
        padding: 8px 0;
        justify-content: flex-start;
        gap: 10px;
      }
      .controls .arrow { display: none; }
      header { padding: 14px 16px; flex-direction: column; gap: 4px; }
      #status-bar { padding: 8px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>IAST Replacer</h1>
  <p>Converts Sanskrit terms to standard IAST transliteration</p>
</header>

<div id="status-bar" class="loading">
  <span class="spinner"></span>
  <span id="status-text">Loading spelling guide…</span>
</div>

<main>
  <div class="panel">
    <label for="input-text">Input text</label>
    <textarea id="input-text" placeholder="Paste your text here…&#10;&#10;e.g. Krishna teaches Arjuna about dharma and karma in the Bhagavad Gita."></textarea>
  </div>

  <div class="controls">
    <div class="arrow">→</div>
    <button id="convert-btn" disabled>
      Convert
    </button>
    <button id="copy-btn" disabled>Copy</button>
  </div>

  <div class="panel">
    <label>Output</label>
    <div id="output-highlight"></div>
    <div class="output-meta" id="output-meta"></div>
  </div>
</main>

<footer>
  Uses the BM Knowledge IAST Spelling Guide &nbsp;·&nbsp; <a href="https://github.com/acharl/IAST_replacer" style="color:#aaa">GitHub</a>
</footer>

<script>
// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const LETTER_CHARS = "A-Za-z\u0100-\u017F\u1E00-\u1EFF\u00C0-\u00FF";
const DROPPED_A_MIN_STEM_LEN = 5;
const VOWELS = new Set([...'aeiouāēīōūṛḷ']);

// ---------------------------------------------------------------------------
// CSV parsing
// ---------------------------------------------------------------------------

function parseCSV(text) {
  // Strip BOM if present
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

  const rows = [];
  const lines = text.split(/\r?\n/);
  if (lines.length === 0) return rows;

  const headers = parseCSVLine(lines[0]);

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (values[idx] || '').trim(); });
    rows.push(row);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// ---------------------------------------------------------------------------
// Variant generation
// ---------------------------------------------------------------------------

function expandParentheses(iast, rom) {
  if (!iast.includes('(') && !rom.includes('(')) return [[iast, rom]];

  const parenRe = /\(([^)]*)\)/g;

  const iastStem = iast.replace(parenRe, '');
  const romStem  = rom.replace(parenRe, '');

  let iastSuffix = '', romSuffix = '';
  for (const m of iast.matchAll(/\(([^)]*)\)/g)) iastSuffix += m[1];
  for (const m of rom.matchAll(/\(([^)]*)\)/g))  romSuffix  += m[1];

  const iastFull = iastStem + iastSuffix;
  const romFull  = romStem  + romSuffix;

  const raw = [[iastStem, romStem]];
  if (iastFull !== iastStem || romFull !== romStem) raw.push([iastFull, romFull]);

  const seen = new Set();
  const cleaned = [];
  for (const [i, r] of raw) {
    const is = i.trim(), rs = r.trim();
    if (!is || !rs) continue;
    const key = `${is}\x00${rs}`;
    if (seen.has(key)) continue;
    seen.add(key);
    cleaned.push([is, rs]);
  }
  return cleaned.length ? cleaned : [[iast, rom]];
}

function generateDroppedAVariant(iast, rom) {
  if (!rom || !rom.endsWith('a')) return null;
  // 'ā' ends with 'a' in JS — guard against it
  if (rom.endsWith('\u0101')) return null;   // ā

  const romDropped = rom.slice(0, -1);
  const lastSeg = romDropped.split(/[\s\-]/).pop();
  if (lastSeg.length < DROPPED_A_MIN_STEM_LEN) return null;
  if (VOWELS.has(romDropped[romDropped.length - 1])) return null;

  return [iast, romDropped];
}

// ---------------------------------------------------------------------------
// Build replacement rules
// ---------------------------------------------------------------------------

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function buildReplacements(rows) {
  const replacements = [];
  const seenWrong = new Map();

  function tryAdd(wrong, right, origin) {
    wrong = wrong.trim();
    right = right.trim();
    if (!wrong || !right || wrong === right) return;
    const key = wrong.toLowerCase();
    if (seenWrong.has(key)) return;

    const pattern = new RegExp(
      `(?<![${LETTER_CHARS}])${escapeRegex(wrong)}(?![${LETTER_CHARS}])`,
      'gi'
    );
    const rule = { wrong, right, origin, pattern };
    seenWrong.set(key, rule);
    replacements.push(rule);
  }

  for (const row of rows) {
    const iast = (row['IAST'] || '').trim();
    const rom  = (row['Romanized Spelling'] || '').trim();
    if (!iast || !rom) continue;

    const pairs = expandParentheses(iast, rom);
    for (const [iastForm, romForm] of pairs) {
      const origin = pairs.length === 1 ? 'direct' : 'paren-expansion';
      tryAdd(romForm, iastForm, origin);

      const dropped = generateDroppedAVariant(iastForm, romForm);
      if (dropped) tryAdd(dropped[1], dropped[0], 'dropped-a');
    }
  }

  // Longer patterns take priority
  replacements.sort((a, b) =>
    b.wrong.length - a.wrong.length || a.wrong.localeCompare(b.wrong)
  );
  return replacements;
}

// ---------------------------------------------------------------------------
// Case preservation
// ---------------------------------------------------------------------------

const SENTENCE_END_RE = /[.!?]["'"')\]]*\s+$/;

function isAtSentenceStart(line, pos) {
  const before = line.slice(0, pos);
  if (before.trim() === '') return true;
  if (SENTENCE_END_RE.test(before)) return true;
  return false;
}

function matchCase(original, replacement, sentenceStart) {
  if (!original || !replacement) return replacement;
  // ALL CAPS (e.g. headings)
  if (original.length > 1 && original === original.toUpperCase() &&
      original !== original.toLowerCase()) {
    return replacement.toUpperCase();
  }
  // Sentence-initial capital
  if (sentenceStart &&
      original[0] === original[0].toUpperCase() &&
      original[0] !== original[0].toLowerCase()) {
    return replacement[0].toUpperCase() + replacement.slice(1);
  }
  return replacement;
}

// ---------------------------------------------------------------------------
// Apply replacements to a single line
// ---------------------------------------------------------------------------

function applyReplacementsToLine(line, replacements) {
  const candidates = [];

  for (const rule of replacements) {
    for (const m of line.matchAll(rule.pattern)) {
      const start = m.index;
      const end   = start + m[0].length;
      const matched = m[0];
      const newSpelling = matchCase(
        matched, rule.right, isAtSentenceStart(line, start)
      );
      if (matched === newSpelling) continue;
      candidates.push({ start, end, matched, newSpelling, rule });
    }
  }

  // Prefer earlier positions; for ties prefer longer match
  candidates.sort((a, b) =>
    a.start - b.start || (b.end - b.start) - (a.end - a.start)
  );

  // Remove overlaps
  const kept = [];
  let lastEnd = -1;
  for (const c of candidates) {
    if (c.start >= lastEnd) { kept.push(c); lastEnd = c.end; }
  }

  // Build plain-text result and HTML result simultaneously (reverse order)
  let plain = line;
  const htmlParts = []; // will build html in forward order at the end

  // Build HTML result with <mark> on changed spans
  let htmlResult = '';
  let cursor = 0;
  for (const { start, end, newSpelling } of kept) {
    htmlResult += escapeHtml(line.slice(cursor, start));
    htmlResult += `<mark>${escapeHtml(newSpelling)}</mark>`;
    cursor = end;
  }
  htmlResult += escapeHtml(line.slice(cursor));

  // Build plain text (reverse)
  for (let i = kept.length - 1; i >= 0; i--) {
    const { start, end, newSpelling } = kept[i];
    plain = plain.slice(0, start) + newSpelling + plain.slice(end);
  }

  return { plain, html: htmlResult, count: kept.length };
}

function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ---------------------------------------------------------------------------
// Process full text
// ---------------------------------------------------------------------------

function processText(text, replacements) {
  const lines = text.split('\n');
  const plainLines = [];
  const htmlLines  = [];
  let totalChanges = 0;

  for (const line of lines) {
    const { plain, html, count } = applyReplacementsToLine(line, replacements);
    plainLines.push(plain);
    htmlLines.push(html);
    totalChanges += count;
  }

  return {
    plain: plainLines.join('\n'),
    html:  htmlLines.join('\n'),
    totalChanges,
  };
}

// ---------------------------------------------------------------------------
// UI
// ---------------------------------------------------------------------------

let replacements = null;

const statusBar  = document.getElementById('status-bar');
const statusText = document.getElementById('status-text');
const convertBtn = document.getElementById('convert-btn');
const copyBtn    = document.getElementById('copy-btn');
const inputEl    = document.getElementById('input-text');
const outputEl   = document.getElementById('output-highlight');
const outputMeta = document.getElementById('output-meta');

function setStatus(cls, msg, showSpinner) {
  statusBar.className = cls;
  statusText.textContent = msg;
  const existing = statusBar.querySelector('.spinner');
  if (showSpinner && !existing) {
    const sp = document.createElement('span');
    sp.className = 'spinner';
    statusBar.insertBefore(sp, statusText);
  } else if (!showSpinner && existing) {
    existing.remove();
  }
}

async function loadGuide() {
  try {
    const res = await fetch('IAST.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    replacements = buildReplacements(rows);
    setStatus('ready', `Ready — ${replacements.length} replacement rules loaded`, false);
    convertBtn.disabled = false;
  } catch (err) {
    setStatus('error', `Failed to load IAST.csv: ${err.message}`, false);
  }
}

convertBtn.addEventListener('click', () => {
  if (!replacements) return;
  const input = inputEl.value;
  if (!input.trim()) { outputEl.textContent = ''; outputMeta.innerHTML = ''; copyBtn.disabled = true; return; }

  const { plain, html, totalChanges } = processText(input, replacements);

  outputEl.innerHTML = html;
  outputEl._plain = plain;

  if (totalChanges === 0) {
    outputMeta.innerHTML = 'No changes made.';
  } else {
    outputMeta.innerHTML = `<span>${totalChanges}</span> replacement${totalChanges === 1 ? '' : 's'} made`;
  }
  copyBtn.disabled = false;
});

copyBtn.addEventListener('click', async () => {
  const plain = outputEl._plain;
  if (!plain) return;
  try {
    await navigator.clipboard.writeText(plain);
    const prev = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = prev; }, 1500);
  } catch {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = plain;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
});

// Also allow Ctrl/Cmd+Enter to convert
inputEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convertBtn.click();
});

loadGuide();
</script>
</body>
</html>
